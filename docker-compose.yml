version: "3.9"
services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/electracore
      MQTT_URL: mqtt://mosquitto:1883
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
    depends_on:
      - mongo
      - mosquitto

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"

volumes:
  mongo-data:
